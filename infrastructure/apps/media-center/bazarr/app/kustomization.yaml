---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - helmrelease.yaml
  - ocirepository.yaml
  - pvc.yaml

configMapGenerator:
  - name: bazarr-anisub
    files:
      - anisub.py=resources/anisub.py
    options:
      disableNameSuffixHash: true

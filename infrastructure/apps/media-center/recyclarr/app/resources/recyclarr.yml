---
# yaml-language-server: $schema=https://schemas.recyclarr.dev/v8/config-schema.json
sonarr:
  sonarr:
    base_url: http://sonarr.media-center.svc.cluster.local
    api_key: !env_var SONARR_API_KEY

    quality_definition:
      type: series

    quality_profiles:
      - trash_id: 72dae194fc92bf828f32cde7744e51a1 # WEB-1080p
        reset_unmatched_scores:
          enabled: true
      - trash_id: 20e0fc959f1f1704bed501f23bdae76f # [Anime] Remux-1080p
        reset_unmatched_scores:
          enabled: true

    custom_format_groups:
      add:
        - trash_id: 158188097a58d7687dee647e04af0da3 # [Required] Golden Rule HD
          select:
            - 47435ece6b99a0b477caf360e79ba0bb # x265 (HD)

    custom_formats:
      - trash_ids:
          - 7ba05c6e0e14e793538174c679126996 # MULTi
        assign_scores_to:
          - name: WEB-1080p
            score: 50
      # Neutralize x265 (HD) penalty for anime — anime legitimately uses x265
      - trash_ids:
          - 47435ece6b99a0b477caf360e79ba0bb # x265 (HD)
        assign_scores_to:
          - name: "[Anime] Remux-1080p"
            score: 500
      # Bad release indicators — penalize across all profiles
      - trash_ids:
          - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
          - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
          - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
          - 06d66ab109d4d2eddb2794d21526d140 # Retags
          - 1b3994c551cbb92a2c781af061f4ab44 # Scene
        assign_scores_to:
          - name: WEB-1080p
            score: -10000
      # Scene is intentionally excluded from the anime profile — its regex false-positives
      # on fansub bracket notation (e.g. "[1080p WEB AAC]" triggers the [_. ]WEB[_. ] pattern)
      - trash_ids:
          - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
          - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
          - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
          - 06d66ab109d4d2eddb2794d21526d140 # Retags
        assign_scores_to:
          - name: "[Anime] Remux-1080p"
            score: -10000
      # Audio preferences
      - trash_ids:
          - 851bd64e04c9374c51102be3dd9ae4cc # FLAC
        assign_scores_to:
          - name: WEB-1080p
            score: 2250
          - name: "[Anime] Remux-1080p"
            score: 500
      # Mild preference against dual audio — tiebreaker only, not a veto
      - trash_ids:
          - 418f50b10f1907201b6cfdf881f467b7 # Anime Dual Audio
        assign_scores_to:
          - name: "[Anime] Remux-1080p"
            score: -100
      - trash_ids:
          - 28f6ef16d61e2d1adfce3156ed8257e3 # Opus
        assign_scores_to:
          - name: WEB-1080p
            score: 100
          - name: "[Anime] Remux-1080p"
            score: 100
      # Remux release groups — score these in WEB-1080p too so remuxes aren't displaced by WEBDLs
      # (reset_unmatched_scores would zero these out otherwise, causing ties with season-pack WEBDLs)
      - trash_ids:
          - 3a3ff47579026e76d6504ebea39390de # Remux Tier 01
        assign_scores_to:
          - name: WEB-1080p
            score: 1950
      - trash_ids:
          - 9f98181fe5a3fbeb0cc29340da2a468a # Remux Tier 02
        assign_scores_to:
          - name: WEB-1080p
            score: 1900
      - trash_ids:
          - 8baaf0b3142bf4d94c42a724f034e27a # Remux Tier 03
        assign_scores_to:
          - name: WEB-1080p
            score: 1850
      # WEB release groups
      - trash_ids:
          - e6258996055b9fbab7e9cb2f75819294 # WEB Tier 01
        assign_scores_to:
          - name: WEB-1080p
            score: 1700
      - trash_ids:
          - 58790d4e2fdcd9733aa7ae68ba2bb503 # WEB Tier 02
        assign_scores_to:
          - name: WEB-1080p
            score: 1650
      - trash_ids:
          - d84935abd3f8556dcd51d4f27e22d0a6 # WEB Tier 03
        assign_scores_to:
          - name: WEB-1080p
            score: 1600
      # Anime BD encode groups — best quality for BD-sourced anime (x265 10-bit)
      # T2→T3 gap is intentionally 50 so the -100 dual audio penalty flips dual-audio T2 below JP-only T3
      - trash_ids:
          - 949c16fe0a8147f50ba82cc2df9411c9 # Anime BD Tier 01
        assign_scores_to:
          - name: "[Anime] Remux-1080p"
            score: 2000
      - trash_ids:
          - ed7f1e315e000aef424a58517fa48727 # Anime BD Tier 02
        assign_scores_to:
          - name: "[Anime] Remux-1080p"
            score: 1900
      - trash_ids:
          - 096e406c92baa713da4a72d88030b815 # Anime BD Tier 03
        assign_scores_to:
          - name: "[Anime] Remux-1080p"
            score: 1850
      # Anime WEB release groups
      - trash_ids:
          - e0014372773c8f0e1bef8824f00c7dc4 # Anime Web Tier 01
        assign_scores_to:
          - name: "[Anime] Remux-1080p"
            score: 1000
      - trash_ids:
          - 19180499de5ef2b84b6ec59aae444696 # Anime Web Tier 02
        assign_scores_to:
          - name: "[Anime] Remux-1080p"
            score: 750
      - trash_ids:
          - c27f2ae6a4e82373b0f1da094e2489ad # Anime Web Tier 03
        assign_scores_to:
          - name: "[Anime] Remux-1080p"
            score: 500
      # Season Pack — prefer season packs over individual episodes so Sonarr
      # auto-upgrades a full season once one drops, instead of manual episode cleanup
      - trash_ids:
          - 3bc5f395426614e155e585a2f056cdf1 # Season Pack
        assign_scores_to:
          - name: WEB-1080p
            score: 300
          - name: "[Anime] Remux-1080p"
            score: 300

radarr:
  radarr:
    base_url: http://radarr.media-center.svc.cluster.local
    api_key: !env_var RADARR_API_KEY

    quality_definition:
      type: movie

    quality_profiles:
      - trash_id: 9ca12ea80aa55ef916e3751f4b874151 # Remux + WEB 1080p
        reset_unmatched_scores:
          enabled: true
      - trash_id: fd161a61e3ab826d3a22d53f935696dd # Remux + WEB 2160p
        reset_unmatched_scores:
          enabled: true
      - trash_id: 722b624f9af1e492284c4bc842153a38 # Remux-1080p - Anime
        reset_unmatched_scores:
          enabled: true

    custom_format_groups:
      add:
        - trash_id: f8bf8eab4617f12dfdbd16303d8da245 # [Required] Golden Rule HD
          select:
            - dc98083864ea246d05a42df0d05f81cc # x265 (HD)
        - trash_id: ff204bbcecdd487d1cefcefdbf0c278d # [Required] Golden Rule UHD
          select:
            - 839bea857ed2c0a8e084f3cbdbd65ecb # x265 (no HDR/DV)
        - trash_id: 1616617ab3a14397a2b2321bcbda44d1 # [HDR Formats] DV Boost
        - trash_id: b29413a7487478fe98228ce79e5689e4 # [HDR Formats] HDR10+ Boost

    custom_formats:
      - trash_ids:
          - 4b900e171accbfb172729b63323ea8ca # Multi
        assign_scores_to:
          - name: Remux + WEB 1080p
            score: 50
          - name: Remux + WEB 2160p
            score: 50
      # SDR penalization for 2160p only — SDR is normal at 1080p
      - trash_ids:
          - 9c38ebb7384dada637be8899efa68e6f # SDR
          - 25c12f78430a3a23413652cbd1d48d77 # SDR (no WEBDL)
        assign_scores_to:
          - name: Remux + WEB 2160p
            score: -10000
      # x265 (HD) — moderate penalty for 1080p so Tier 1 groups can overcome it;
      # neutralized for anime which legitimately uses x265
      - trash_ids:
          - dc98083864ea246d05a42df0d05f81cc # x265 (HD)
        assign_scores_to:
          - name: Remux + WEB 1080p
            score: -1000
          - name: "[Anime] Remux-1080p"
            score: 500
      # x265 (no HDR/DV) — neutralize for anime only; 2160p keeps Golden Rule default
      - trash_ids:
          - 839bea857ed2c0a8e084f3cbdbd65ecb # x265 (no HDR/DV)
        assign_scores_to:
          - name: "[Anime] Remux-1080p"
            score: 500
      # Bad release indicators — penalize across all profiles
      - trash_ids:
          - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
          - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
          - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
          - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
          - f537cf427b64c38c8e36298f657e4828 # Scene
        assign_scores_to:
          - name: Remux + WEB 1080p
            score: -10000
          - name: Remux + WEB 2160p
            score: -10000
          - name: "[Anime] Remux-1080p"
            score: -10000
      # Audio preferences
      - trash_ids:
          - a570d4a0e56a2874b64e5bfa55202a1b # FLAC
        assign_scores_to:
          - name: Remux + WEB 1080p
            score: 2250
          - name: Remux + WEB 2160p
            score: 2250
          - name: "[Anime] Remux-1080p"
            score: 2250
      - trash_ids:
          - a061e2e700f81932daf888599f8a8273 # Opus
        assign_scores_to:
          - name: Remux + WEB 1080p
            score: 100
          - name: Remux + WEB 2160p
            score: 100
          - name: "[Anime] Remux-1080p"
            score: 100
      # HD Bluray encode groups — high-quality x265 1080p encodes from Blu-ray source
      # net scores after -1000 x265 (HD) penalty: T1=3000, T2=2500, T3=2000
      - trash_ids:
          - ed27ebfef2f323e964fb1f61391bcb35 # HD Bluray Tier 01
        assign_scores_to:
          - name: Remux + WEB 1080p
            score: 4000
          - name: "[Anime] Remux-1080p"
            score: 4000
      - trash_ids:
          - c20c8647f2746a1f4c4262b0fbbeeeae # HD Bluray Tier 02
        assign_scores_to:
          - name: Remux + WEB 1080p
            score: 3500
          - name: "[Anime] Remux-1080p"
            score: 3500
      - trash_ids:
          - 5608c71bcebba0a5e666223bae8c9227 # HD Bluray Tier 03 (includes BHDStudio)
        assign_scores_to:
          - name: Remux + WEB 1080p
            score: 3000
          - name: "[Anime] Remux-1080p"
            score: 3000
      # UHD Bluray encode groups — high-quality x265 4K encodes from Blu-ray source
      - trash_ids:
          - 4d74ac4c4db0b64bff6ce0cffef99bf0 # UHD Bluray Tier 01
        assign_scores_to:
          - name: Remux + WEB 2160p
            score: 2500
      - trash_ids:
          - a58f517a70193f8e578056642178419d # UHD Bluray Tier 02
        assign_scores_to:
          - name: Remux + WEB 2160p
            score: 2250
      - trash_ids:
          - e71939fae578037e7aed3ee219bbe7c1 # UHD Bluray Tier 03
        assign_scores_to:
          - name: Remux + WEB 2160p
            score: 2000
      # Remux release groups
      - trash_ids:
          - 3a3ff47579026e76d6504ebea39390de # Remux Tier 01
        assign_scores_to:
          - name: Remux + WEB 1080p
            score: 1950
          - name: Remux + WEB 2160p
            score: 1950
          - name: "[Anime] Remux-1080p"
            score: 1950
      - trash_ids:
          - 9f98181fe5a3fbeb0cc29340da2a468a # Remux Tier 02
        assign_scores_to:
          - name: Remux + WEB 1080p
            score: 1900
          - name: Remux + WEB 2160p
            score: 1900
          - name: "[Anime] Remux-1080p"
            score: 1900
      - trash_ids:
          - 8baaf0b3142bf4d94c42a724f034e27a # Remux Tier 03
        assign_scores_to:
          - name: Remux + WEB 1080p
            score: 1850
          - name: Remux + WEB 2160p
            score: 1850
          - name: "[Anime] Remux-1080p"
            score: 1850
      # WEB release groups
      - trash_ids:
          - c20f169ef63c5f40c2def54abaf4438e # WEB Tier 01
        assign_scores_to:
          - name: Remux + WEB 1080p
            score: 1700
          - name: Remux + WEB 2160p
            score: 1700
          - name: "[Anime] Remux-1080p"
            score: 1700
      - trash_ids:
          - 403816d65392c79236dcb6dd591aeda4 # WEB Tier 02
        assign_scores_to:
          - name: Remux + WEB 1080p
            score: 1650
          - name: Remux + WEB 2160p
            score: 1650
          - name: "[Anime] Remux-1080p"
            score: 1650
      - trash_ids:
          - af94e0fe497124d1f9ce732069ec8c3b # WEB Tier 03
        assign_scores_to:
          - name: Remux + WEB 1080p
            score: 1600
          - name: Remux + WEB 2160p
            score: 1600
          - name: "[Anime] Remux-1080p"
            score: 1600

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kansou
spec:
  chartRef:
    kind: OCIRepository
    name: kansou
  interval: 1h
  valuesFrom:
    - kind: Secret
      name: kansou-secret
      valuesKey: ANILIST_TOKEN
      targetPath: anilistToken
  values:
    image:
      repository: ghcr.io/kondanta/kansou
      # renovate: datasource=docker depName=ghcr.io/kondanta/kansou
      tag: "1.3.0"
    liveConfig:
      enabled: true
      persistence:
        size: 100Mi
    httpRoute:
      enabled: true
      gateway:
        name: internal
        namespace: network
        sectionName: https
      hostnames:
        - kansou.taylan.dev

    config: |
      max_multiplier = 2.0
      primary_genre_weight = 0.6

      [dimensions.story]
      label = "Story"
      description = "Plot, hook, themes, and how well the narrative concludes"
      weight = 0.25
      bias_resistant = false

      [dimensions.enjoyment]
      label = "Enjoyment"
      description = "Gut feeling. How much fun did you have? Did you look forward to the next entry?"
      weight = 0.15
      bias_resistant = true

      [dimensions.characters]
      label = "Characters"
      description = "Relatability, growth arcs, and chemistry between the cast"
      weight = 0.20
      bias_resistant = false

      [dimensions.production]
      label = "Production"
      description = "Anime: animation fluidity, voice acting, OST. Manga: art style, character design, paneling"
      weight = 0.15
      bias_resistant = false

      [dimensions.pacing]
      label = "Pacing"
      description = "How well the story flows. Is it dragging? Rushed? Does it keep you hooked?"
      weight = 0.10
      bias_resistant = false

      [dimensions.world_building]
      label = "World Building"
      description = "The setting, rules/systems, and how immersive the lore feels"
      weight = 0.10
      bias_resistant = false

      [dimensions.value]
      label = "Value"
      description = "Rewatch/reread value. Does it have staying power in your mind?"
      weight = 0.05
      bias_resistant = true

      [genres.action]
      production = 1.4
      pacing = 1.3
      story = 0.8
      world_building = 0.9

      [genres.adventure]
      world_building = 1.3
      pacing = 1.2
      story = 1.1

      [genres.comedy]
      characters = 1.4
      pacing = 1.1
      story = 0.7
      world_building = 0.7

      [genres.drama]
      story = 1.4
      characters = 1.3
      production = 0.8
      pacing = 1.1

      [genres.fantasy]
      world_building = 1.5
      story = 1.2
      production = 1.1

      [genres.horror]
      production = 1.4
      pacing = 1.4
      story = 1.0

      [genres.mystery]
      story = 1.4
      pacing = 1.3
      world_building = 1.2

      [genres.psychological]
      story = 1.4
      characters = 1.3
      pacing = 1.1
      world_building = 1.1
      production = 0.8

      [genres.romance]
      characters = 1.5
      story = 1.1

      [genres.sci-fi]
      world_building = 1.4
      story = 1.2
      production = 1.1

      [genres.slice_of_life]
      characters = 1.5
      world_building = 0.7
      story = 0.8
      pacing = 0.9

      [genres.sports]
      pacing = 1.4
      characters = 1.2
      production = 1.2
      story = 0.9
      world_building = 0.7

      [genres.supernatural]
      world_building = 1.3
      story = 1.1
      production = 1.1

      [genres.thriller]
      story = 1.4
      pacing = 1.4
      characters = 1.1
      production = 0.9

      [genres.mecha]
      story = 1.3
      production = 1.4
      world_building = 1.2
      pacing = 1.1

      [server]
      port = 8080
      cors_allowed_origins = [
          "http://localhost:3000",
          "http://localhost:5173",
          "http://localhost:8080",
      ]
    resources:
      requests:
        cpu: 10m
      limits:
        cpu: 50m
        memory: 128Mi

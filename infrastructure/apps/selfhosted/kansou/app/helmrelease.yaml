---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kansou
spec:
  chartRef:
    kind: OCIRepository
    name: kansou
  interval: 1h
  valuesFrom:
    - kind: Secret
      name: kansou-secret
      valuesKey: ANILIST_TOKEN
      targetPath: anilistToken
  values:
    liveConfig:
      enabled: true
      persistence:
        size: 100Mi
    httpRoute:
      enabled: true
      gateway:
        name: internal
        namespace: network
        sectionName: http
      hostnames:
        - kansou.taylan.dev

    resources:
      requests:
        cpu: 10m
      limits:
        memory: 128Mi

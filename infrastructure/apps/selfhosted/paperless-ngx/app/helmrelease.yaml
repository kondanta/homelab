---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app paperless-ngx
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 15m
  maxHistory: 3
  uninstall:
    keepHistory: false
  install:
    remediation:
      retries: 1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  driftDetection:
    mode: enabled
    ignore:
      - paths:
          - /spec/containers/resources/limits
        target:
          kind: Pod
  values:
    controllers:
      paperless-ngx:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}"
        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.20.15@sha256:6c86cad803970ea782683a8e80e7403444c5bf3cf70de63b4d3c8e87500db92f
            env:
              TZ: Europe/Oslo
              PAPERLESS_URL: https://paperless.taylan.dev
              PAPERLESS_PORT: &port 8000
              PAPERLESS_TIME_ZONE: Europe/Oslo
              PAPERLESS_DBENGINE: postgresql
              PAPERLESS_DBHOST: backup.internal
              PAPERLESS_DBPORT: "5432"
              PAPERLESS_DBNAME: paperless
              PAPERLESS_REDIS: redis://backup.internal:6379
              PAPERLESS_OCR_LANGUAGE: eng
              PAPERLESS_TIKA_ENABLED: "1"
              PAPERLESS_TIKA_ENDPOINT: http://localhost:9998
              PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://localhost:3000
              PAPERLESS_THREADS_PER_WORKER: "1"
              PAPERLESS_WEBSERVER_WORKERS: "1"
              PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
              PAPERLESS_DISABLE_REGULAR_LOGIN: "true"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /accounts/login/
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /accounts/login/
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /accounts/login/
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 512M
              limits:
                memory: 2Gi
            securityContext:
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "SETUID", "SETGID"]
          tika:
            image:
              repository: apache/tika
              tag: 3.3.1.0@sha256:90b7fa1dc018434075fce9e1d9b88b1e3d0ea6979d0cf86e116c79a8073ae973
            resources:
              limits:
                memory: 220Mi
              requests:
                cpu: 10m
                memory: 220Mi
          gotenberg:
            env:
              DISABLE_GOOGLE_CHROME: "1"
            image:
              repository: gotenberg/gotenberg
              tag: 8.34.0@sha256:67097317623a503ba2a6a7e9ae8db6929a1f7e1bbd88077bacf2d325fbdab923
            resources:
              requests:
                cpu: 10m
                memory: 128Mi

    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |
            path: /api/
            conditions:
              - "[STATUS] < 400"
        hostnames:
          - paperless.taylan.dev
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
          - name: external
            namespace: network
            sectionName: https

    persistence:
      media:
        existingClaim: paperless-ngx
        advancedMounts:
          paperless-ngx:
            app:
              - path: /usr/src/paperless/media
      data:
        existingClaim: paperless-ngx-data
        advancedMounts:
          paperless-ngx:
            app:
              - path: /usr/src/paperless/data
      consume:
        type: emptyDir
        advancedMounts:
          paperless-ngx:
            app:
              - path: /usr/src/paperless/consume
      export:
        type: emptyDir
        advancedMounts:
          paperless-ngx:
            app:
              - path: /usr/src/paperless/export

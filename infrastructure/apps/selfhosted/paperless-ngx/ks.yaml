---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app paperless-ngx
spec:
  targetNamespace: selfhosted
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./infrastructure/apps/selfhosted/paperless-ngx/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: *app
      GATUS_SUBDOMAIN: paperless
      VOLSYNC_CAPACITY: 50Gi
      VOLSYNC_RETAIN_DAILY: "30"
      VOLSYNC_RETAIN_WEEKLY: "8"
  dependsOn:
    - name: longhorn
      namespace: longhorn-system

---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app silverbullet
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 1h
  components:
    - ../../../../components/volsync
    - ../../../../components/fa
  path: ./infrastructure/apps/selfhosted/silverbullet/app
  postBuild:
    substitute:
      APP: silverbullet
      VOLSYNC_CAPACITY: 5Gi
      VOLSYNC_RETAIN_DAILY: "3"
      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  wait: false
  dependsOn:
    - name: longhorn
      namespace: longhorn-system

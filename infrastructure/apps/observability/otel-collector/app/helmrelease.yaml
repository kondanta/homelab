---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-collector
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: otel-collector
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    mode: deployment
    replicaCount: 1

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 100Mi

    config:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317

      processors:
        tail_sampling:
          decision_wait: 10s
          policies:
            - name: errors
              type: status_code
              status_code:
                status_codes: [ERROR]
            - name: slow-requests
              type: latency
              latency:
                threshold_ms: 2000
            - name: probabilistic
              type: probabilistic
              probabilistic:
                sampling_percentage: 10
        batch: {}

      exporters:
        otlp:
          endpoint: tempo.observability.svc.cluster.local:4317
          tls:
            insecure: true

      service:
        pipelines:
          traces:
            receivers: [otlp]
            processors: [tail_sampling, batch]
            exporters: [otlp]

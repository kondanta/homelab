---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name metrics-server
spec:
  interval: 1h
  prune: true
  path: ./infrastructure/apps/kube-system/metrics-server/app
  postBuild:
    substitute:
      APP: *name
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: kube-system


---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: envoy-gateway
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 1.7.1
  url: oci://docker.io/envoyproxy/gateway-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app envoy-gateway
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: *app
  driftDetection:
    mode: warn
  install:
    crds: Skip
    disableHooks: false
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    crds: Skip
    disableHooks: false
    remediation:
      retries: 3
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apiextensions.k8s.io
              kind: CustomResourceDefinition
              name: ".*\\.gateway\\.networking\\.k8s\\.io$"
            patch: |
              $patch: delete
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: placeholder
  values:
    deployment:
      envoyGateway:
        rbac:
          cluster: true
        gateway:
          controllerName: gateway.envoyproxy.io/gatewayclass-controller

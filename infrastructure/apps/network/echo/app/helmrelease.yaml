---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: echo
spec:
  chartRef:
    kind: OCIRepository
    name: echo
  interval: 1h
  values:
    config:
      kubernetes: true
      trustedProxies:
        - 10.42.0.0/16
    httpRoute:
      enabled: true
      hostnames:
        - echo.taylan.dev
      parentRefs:
        - name: external
          namespace: network
          sectionName: https
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 64Mi

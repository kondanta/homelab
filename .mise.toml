# https://mise.jdx.dev/getting-started.html for docs :) 
[env]
SOPS_AGE_KEY_FILE = "{{config_root}}/age.agekey"
TALOSCONFIG = "{{config_root}}/provision/talos/talosconfig"
KUBECONFIG = "{{config_root}}/provision/talos/kubeconfig"
MINIJINJA_CONFIG_FILE = "{{config_root}}/.minijinja.toml"
JUST_UNSTABLE = "1"
LEFTHOOK_OUTPUT = "false"

[tools]
"aqua:casey/just" = "1.50.0"
"aqua:cilium/cilium-cli" = "0.19.2"
"aqua:cli/cli" = "2.91.0"
"aqua:cloudflare/cloudflared" = "2026.3.0"
"aqua:cue-lang/cue" = "0.16.1"
"aqua:evilmartians/lefthook" = "2.1.6"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:fluxcd/flux2" = "2.8.6"
"aqua:getsops/sops" = "3.12.2"
"aqua:helm/helm" = "4.1.4"
"aqua:helmfile/helmfile" = "1.4.4"
"aqua:jqlang/jq" = "1.8.1"
"aqua:kubernetes-sigs/kustomize" = "5.7.1"
"aqua:kubernetes/kubernetes/kubectl" = "1.36.0"
"aqua:mikefarah/yq" = "4.53.2"
"aqua:siderolabs/talos" = "1.12.6"
"aqua:yannh/kubeconform" = "0.7.0"
"pipx:flux-local" = "latest"
"aqua:minijinja/minijinja-cli" = "latest"

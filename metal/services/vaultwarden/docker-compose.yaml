---
services:
  vaultwarden:
    # renovate: datasource=docker depName=vaultwarden/server
    image: vaultwarden/server:1.35.7
    container_name: vaultwarden
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - vaultwarden_data:/data
    networks:
      - proxy

networks:
  proxy:
    external: true

volumes:
  vaultwarden_data:
    driver: local
    driver_opts:
      type: none
      device: /root/projects/vaultwarden/data
      o: bind

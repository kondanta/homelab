---
services:
  redis:
    # renovate: datasource=docker depName=redis
    image: redis:8.8-alpine
    container_name: redis
    restart: unless-stopped
    user: "999:1000"
    ports:
      - "6379:6379"
    env_file:
      - .env
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--save"
      - ""
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redis_data:
    driver: local
    driver_opts:
      type: none
      device: /home/pi/services/redis/data
      o: bind

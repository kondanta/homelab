---
services:
  garage:
    # renovate: datasource=docker depName=dxflrs/garage
    image: dxflrs/garage:v2.3.0
    container_name: garage
    restart: unless-stopped
    ports:
      - "3900:3900"   # S3 API
      - "3903:3903"   # Admin API
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    env_file:
      - .env

  garage-webui:
    # renovate: datasource=docker depName=khairul169/garage-webui
    image: khairul169/garage-webui:1.1.0
    container_name: garage-webui
    restart: unless-stopped
    ports:
      - "3909:3909"
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
    environment:
      - API_ADMIN_KEY=${GARAGE_ADMIN_TOKEN}
      - GARAGE_ENDPOINT=http://garage:3903
    depends_on:
      - garage

volumes:
  garage_meta:
    driver: local
    driver_opts:
      type: none
      device: /home/pi/services/garage/meta
      o: bind
  garage_data:
    driver: local
    driver_opts:
      type: none
      device: /home/pi/services/garage/data
      o: bind
